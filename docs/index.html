<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Options Intelligence Terminal — Wall Street Grade</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060b14;--bg2:#0d1520;--bg3:#111c2a;--bg4:#162030;
  --border:#1e2d3d;--border2:#243448;
  --text:#c9d8e8;--text2:#7a9bb5;--text3:#3d5a73;
  --green:#00d084;--green2:#00a866;--green-bg:#00d08412;
  --red:#ff4560;--red2:#cc3349;--red-bg:#ff456012;
  --yellow:#f5a623;--yellow-bg:#f5a62312;
  --blue:#2196f3;--blue2:#1565c0;--blue-bg:#2196f312;
  --purple:#9c27b0;--cyan:#00bcd4;
  --gold:#ffd700;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,monospace;font-size:13px;overflow-x:hidden}

/* ── TOP BAR ── */
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.logo{font-size:16px;font-weight:800;background:linear-gradient(135deg,#00d084,#2196f3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;white-space:nowrap}
.market-stat{display:flex;flex-direction:column;align-items:center;min-width:70px}
.market-stat .lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px}
.market-stat .val{font-size:13px;font-weight:700;margin-top:1px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:4px}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 #00d08466}50%{opacity:.7;box-shadow:0 0 0 5px #00d08400}}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.tag{border-radius:4px;padding:2px 8px;font-size:10px;font-weight:700;letter-spacing:.5px}
.tag-bull{background:var(--green-bg);color:var(--green);border:1px solid #00d08433}
.tag-bear{background:var(--red-bg);color:var(--red);border:1px solid #ff456033}
.tag-neu{background:var(--blue-bg);color:var(--blue);border:1px solid #2196f333}
#clock{font-size:11px;color:var(--text3);font-family:monospace}

/* ── MAIN LAYOUT ── */
#main{display:grid;grid-template-columns:220px 1fr;grid-template-rows:1fr;height:calc(100vh - 45px);gap:0}

/* ── SECTOR SIDEBAR ── */
#sidebar{background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;padding:8px 0}
.sidebar-title{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1.5px;padding:8px 14px 4px}
.sector-item{display:flex;align-items:center;padding:7px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;gap:8px}
.sector-item:hover{background:var(--bg3);border-left-color:var(--border2)}
.sector-item.active{background:var(--bg4);border-left-color:var(--green)}
.sector-icon{font-size:16px;width:22px;text-align:center}
.sector-info{flex:1;min-width:0}
.sector-name{font-size:11px;font-weight:600;color:var(--text)}
.sector-perf{font-size:10px;margin-top:1px}
.sector-bar{height:2px;border-radius:1px;margin-top:3px;background:var(--border)}
.sector-bar-fill{height:100%;border-radius:1px;transition:width .5s}

/* ── CONTENT AREA ── */
#content{overflow-y:auto;background:var(--bg)}

/* ── SECTOR HEADER ── */
#sector-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;gap:16px}
.sector-h-icon{font-size:28px}
.sector-h-name{font-size:20px;font-weight:800;color:var(--text)}
.sector-h-sub{font-size:11px;color:var(--text2);margin-top:2px}
.sector-metrics{display:flex;gap:20px;margin-left:auto}
.sh-metric{text-align:center}
.sh-metric .lbl{font-size:9px;color:var(--text3);text-transform:uppercase}
.sh-metric .val{font-size:15px;font-weight:700;margin-top:2px}

/* ── GRID ── */
.content-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;padding:12px}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.panel-hdr{padding:10px 14px 8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.panel-hdr-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text2)}
.panel-body{padding:12px 14px}
.span2{grid-column:span 2}
.span3{grid-column:span 3}

/* ── TOP PICKS ── */
.pick-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.pick-card:hover{border-color:var(--border2);background:var(--bg4)}
.pick-card.rank1{border-left:3px solid var(--gold)}
.pick-card.rank2{border-left:3px solid var(--text2)}
.pick-card.rank3{border-left:3px solid #cd7f32}
.pick-rank{position:absolute;right:12px;top:10px;font-size:20px;font-weight:900;color:var(--border2)}
.pick-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pick-ticker{font-size:18px;font-weight:900;color:var(--text)}
.pick-company{font-size:11px;color:var(--text2);margin-top:1px}
.pick-price{font-size:16px;font-weight:700;color:var(--green)}
.pick-change{font-size:11px;margin-top:1px}
.score-bar{height:6px;background:var(--border);border-radius:3px;margin:6px 0}
.score-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--green2),var(--green))}
.pick-signals{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.signal-tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:700}
.pick-thesis{font-size:10px;color:var(--text2);margin-top:8px;line-height:1.5;padding-top:8px;border-top:1px solid var(--border)}
.target-row{display:flex;gap:12px;margin-top:8px}
.target-item{flex:1;background:var(--bg);border-radius:4px;padding:5px 8px}
.target-label{font-size:9px;color:var(--text3)}
.target-val{font-size:12px;font-weight:700;margin-top:2px}

/* ── FLOW TABLE ── */
.flow-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);font-size:11px}
.flow-row:last-child{border-bottom:none}
.flow-side-c{background:var(--green-bg);color:var(--green);border-radius:3px;padding:1px 5px;font-size:9px;font-weight:800}
.flow-side-p{background:var(--red-bg);color:var(--red);border-radius:3px;padding:1px 5px;font-size:9px;font-weight:800}
.flow-premium{color:var(--gold);font-weight:700;margin-left:auto;font-size:12px}
.flow-sweep{background:#f5a62322;color:var(--yellow);border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700}
.flow-block{background:var(--blue-bg);color:var(--blue);border-radius:3px;padding:1px 5px;font-size:9px;font-weight:700}

/* ── PREDICTION CHART ── */
#pred-container{padding:12px 14px}
.pred-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.pred-range{display:flex;gap:6px}
.pred-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:3px 10px;border-radius:4px;cursor:pointer;font-size:10px;transition:all .15s}
.pred-btn.active{background:var(--green-bg);color:var(--green);border-color:var(--green)}

/* ── SECTOR ROTATION ── */
.rotation-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:12px 14px}
.rot-cell{background:var(--bg3);border-radius:5px;padding:8px 6px;text-align:center;cursor:pointer;transition:all .2s;border:1px solid transparent}
.rot-cell:hover{border-color:var(--border2)}
.rot-cell.selected{border-color:var(--green)}
.rot-icon{font-size:18px}
.rot-name{font-size:9px;color:var(--text2);margin-top:3px}
.rot-perf{font-size:12px;font-weight:700;margin-top:2px}
.rot-flow{font-size:9px;margin-top:2px}

/* ── GEX CHART ── */
.gex-mini{padding:8px 14px}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ── TOOLTIP ── */
.tooltip{position:fixed;background:#0a1929;border:1px solid var(--border2);border-radius:6px;padding:8px 12px;font-size:11px;pointer-events:none;z-index:999;display:none;max-width:220px;line-height:1.6}

/* ── ANALYST REPORT ── */
.report-box{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:12px;font-size:11px;line-height:1.7;color:var(--text)}
.report-box h4{color:var(--gold);font-size:12px;margin-bottom:6px}
.report-box .bull{color:var(--green)}
.report-box .bear{color:var(--red)}
.report-box .neutral{color:var(--yellow)}

/* ── PROBABILITY BARS ── */
.prob-row{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:11px}
.prob-label{width:80px;color:var(--text2);text-align:right;flex-shrink:0}
.prob-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.prob-fill{height:100%;border-radius:4px;transition:width .6s}
.prob-val{width:36px;text-align:right;font-weight:700}

/* ── MARKET REGIME ── */
.regime-indicator{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg3);border-radius:6px;margin-bottom:8px}
.regime-icon{font-size:24px}
.regime-text{flex:1}
.regime-name{font-size:14px;font-weight:700}
.regime-desc{font-size:10px;color:var(--text2);margin-top:2px}
.regime-score{font-size:22px;font-weight:900}

/* ── DIVIDER ── */
.section-div{grid-column:span 3;padding:4px 0 0;font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:2px;border-top:1px solid var(--border);margin-top:4px}
</style>
</head>

const fmt = (n, d=2) => typeof n==='number' ? n.toFixed(d) : n;
const fmtPrem = v => v>=1000?`$${(v/1000).toFixed(1)}B`:v>=1?`$${v.toFixed(1)}M`:`$${(v*1000).toFixed(0)}K`;
const scoreColor = s => s>=85?'var(--green)':s>=70?'var(--yellow)':'var(--red)';
const signalColors = {
  'SWEEP×': '#f5a623','SWEEP': '#f5a623',
  'BLOCK': 'var(--blue)','机构': 'var(--cyan)',
  'Call Wall': 'var(--green)','Put Wall': 'var(--red)',
  'IV': 'var(--purple)','GEX': 'var(--green)','鲸鱼': 'var(--gold)',
  'OI激增': 'var(--yellow)','Net Call': 'var(--green)','扫单': 'var(--yellow)',
};
function signalColor(s) {
  for(const [k,v] of Object.entries(signalColors)) if(s.includes(k)) return v;

}

// ═══════════════════════════════════════════════════════════════
// GEX 柱状图
// ═══════════════════════════════════════════════════════════════
function renderGEXChart(s, svgId) {
  const el = document.getElementById(svgId);
  if (!el) return;
  const W = 340, H = 160;
  const svg = d3.select('#'+svgId).attr('viewBox', `0 0 ${W} ${H}`);
  svg.selectAll('*').remove();

  const spot = s.stocks[0].p;
  const stk  = Array.from({length:15}, (_,i) => Math.round(spot*(0.88+i*0.018)/5)*5);
  const gex  = stk.map((k,i) => {
    const dist = Math.abs(k - spot)/spot;
    const base = s.stocks.reduce((sum,st)=>sum + st.gex * Math.exp(-dist*8) * (Math.random()*0.4+0.8), 0);
    return {k, v: k < spot ? base * -0.4 : base * 0.8};
  });

  const xBand = d3.scaleBand().domain(stk.map(String)).range([28,W-8]).padding(0.1);
  const maxV  = d3.max(gex, d => Math.abs(d.v)) || 1;
  const yScale = d3.scaleLinear().domain([-maxV*0.6, maxV]).range([H-18, 8]);

  svg.append('line').attr('x1',28).attr('x2',W-8)
     .attr('y1',yScale(0)).attr('y2',yScale(0))
     .attr('stroke','var(--border2)').attr('stroke-width',1);

  svg.selectAll('rect.gbar').data(gex).enter().append('rect')
    .attr('x', d => xBand(String(d.k))||0)
    .attr('y', d => d.v>=0 ? yScale(d.v) : yScale(0))
    .attr('width', xBand.bandwidth())
    .attr('height', d => Math.abs(yScale(d.v)-yScale(0)))
    .attr('fill', d => d.v>=0 ? '#00d084' : '#ff4560')
    .attr('rx', 2).attr('opacity', .8);

  // 股价线
  const nearK  = stk.reduce((b,k) => Math.abs(k-spot)<Math.abs(b-spot)?k:b, stk[0]);
  const spotXX = (xBand(String(nearK))||0) + xBand.bandwidth()/2;
  svg.append('line').attr('x1',spotXX).attr('x2',spotXX)
     .attr('y1',4).attr('y2',H-18)
     .attr('stroke','#00bcd4').attr('stroke-width',1.5).attr('stroke-dasharray','4,2');
  svg.append('text').attr('x',spotXX+3).attr('y',12)
     .attr('fill','#00bcd4').attr('font-size',8).text('NOW');

  // X轴
  svg.selectAll('text.xt').data(stk.filter((_,i)=>i%3===0)).enter().append('text')
    .attr('x', d => (xBand(String(d))||0)+xBand.bandwidth()/2)
    .attr('y', H-3).attr('text-anchor','middle').attr('fill','var(--text3)').attr('font-size',7).text(d=>d);

  const totalGEX = gex.reduce((s,d)=>s+d.v,0);
  const flipK = gex.find((d,i)=>i>0&&gex[i-1].v*d.v<0);
  document.getElementById(`gex-stats-${s.id}`).innerHTML = `
    <span>总GEX <b style="color:${totalGEX>=0?'var(--green)':'var(--red)'}">${totalGEX>=0?'+':''}${totalGEX.toFixed(1)}B</b></span>
    <span>翻转点 <b style="color:var(--gold)">$${flipK?flipK.k:Math.round(spot*0.98)}</b></span>
    <span>Call Wall <b style="color:var(--green)">$${stk[Math.round(stk.length*0.75)]}</b></span>
    <span>Put Wall <b style="color:var(--red)">$${stk[Math.round(stk.length*0.25)]}</b></span>`;
}

// ═══════════════════════════════════════════════════════════════
// 期权隐含预测路径图
// ═══════════════════════════════════════════════════════════════
function renderPredChart(s, stock, svgId, legendId) {
  const el = document.getElementById(svgId);
  if (!el) return;
  const W = 340, H = 180, margin = {l:36,r:12,t:16,b:24};
  const iw = W-margin.l-margin.r, ih = H-margin.t-margin.b;

  const svg = d3.select('#'+svgId).attr('viewBox',`0 0 ${W} ${H}`);
  svg.selectAll('*').remove();

  const g = svg.append('g').attr('transform',`translate(${margin.l},${margin.t})`);

  const days = 30, n = days+1;
  const spots = Array.from({length:n},(_,i)=>i);
  const s0    = stock.p;
  const sigma = (stock.iv||28)/100/Math.sqrt(252);
  const drift = 0.0003;

  // 生成多条模拟路径
  function genPath(seed) {
    let p = s0;
    return spots.map(d => {
      if (d>0) p = p*Math.exp(drift + sigma*(Math.sin(seed*d*7.3+d)*0.9 + (d/n-0.5)*0.5));
      return {d, p};
    });
  }

  const paths = Array.from({length:8},(_,i)=>genPath(i+1));
  const bullPath = genPath(99); // 牛市路径
  const bearPath = genPath(-5); // 熊市路径

  // 目标价格（从期权隐含）
  const target1m = parseFloat(stock.targets.m1.replace('$',''));

  const allPrices = paths.flat().map(d=>d.p);
  allPrices.push(s0*1.22, s0*0.82);

  const xScale = d3.scaleLinear().domain([0,days]).range([0,iw]);
  const yScale = d3.scaleLinear().domain([d3.min(allPrices)*0.98, d3.max(allPrices)*1.02]).range([ih,0]);

  // 置信区间（2-sigma）
  const upper1 = spots.map(d => s0*Math.exp((drift-0.5*sigma*sigma)*d + sigma*Math.sqrt(d)*1.645));
  const lower1 = spots.map(d => s0*Math.exp((drift-0.5*sigma*sigma)*d - sigma*Math.sqrt(d)*1.645));
  const upper2 = spots.map(d => s0*Math.exp((drift-0.5*sigma*sigma)*d + sigma*Math.sqrt(d)*1.0));
  const lower2 = spots.map(d => s0*Math.exp((drift-0.5*sigma*sigma)*d - sigma*Math.sqrt(d)*1.0));

  const areaFn = d3.area().x(d=>xScale(d)).y0(d=>yScale(lower1[d])).y1(d=>yScale(upper1[d]));
  const area2Fn = d3.area().x(d=>xScale(d)).y0(d=>yScale(lower2[d])).y1(d=>yScale(upper2[d]));

  // 阴影区
  g.append('path').datum(spots).attr('d',areaFn).attr('fill','#2196f3').attr('opacity',.08);
  g.append('path').datum(spots).attr('d',area2Fn).attr('fill','#2196f3').attr('opacity',.12);

  // 模拟路径
  const line = d3.line().x(d=>xScale(d.d)).y(d=>yScale(d.p));
  paths.forEach(path=>{
    g.append('path').datum(path).attr('d',line).attr('fill','none')
     .attr('stroke','#2196f3').attr('stroke-width',.8).attr('opacity',.25);
  });

  // 牛市/熊市路径
  g.append('path').datum(bullPath).attr('d',line).attr('fill','none')
   .attr('stroke','var(--green)').attr('stroke-width',1.5).attr('stroke-dasharray','4,2').attr('opacity',.7);
  g.append('path').datum(bearPath).attr('d',line).attr('fill','none')
   .attr('stroke','var(--red)').attr('stroke-width',1.5).attr('stroke-dasharray','4,2').attr('opacity',.7);

  // 期权隐含中位路径
  const medianPath = spots.map(d=>({d, p:s0*Math.exp((drift-0.5*sigma*sigma)*d)}));
  g.append('path').datum(medianPath).attr('d',line).attr('fill','none')
   .attr('stroke',stock.chg>=0?'var(--green)':'var(--red)').attr('stroke-width',2).attr('opacity',.9);

  // 现价线
  g.append('line').attr('x1',0).attr('x2',iw).attr('y1',yScale(s0)).attr('y2',yScale(s0))
   .attr('stroke','var(--text3)').attr('stroke-width',.8).attr('stroke-dasharray','2,2');

  // 目标价线
  g.append('line').attr('x1',xScale(21)).attr('x2',iw).attr('y1',yScale(target1m)).attr('y2',yScale(target1m))
   .attr('stroke','var(--gold)').attr('stroke-width',1).attr('stroke-dasharray','3,2').attr('opacity',.7);
  g.append('text').attr('x',iw+2).attr('y',yScale(target1m)+3).attr('fill','var(--gold)').attr('font-size',8).text(`T $${target1m}`);

  // Y轴
  g.append('g').call(d3.axisLeft(yScale).ticks(4).tickFormat(d=>'$'+d3.format('.0f')(d)))
   .selectAll('text').attr('fill','var(--text3)').attr('font-size',8);
  g.select('.domain').attr('stroke','var(--border)');
  g.selectAll('.tick line').attr('stroke','var(--border)');

  // X轴
  g.append('g').attr('transform',`translate(0,${ih})`)
   .call(d3.axisBottom(xScale).ticks(5).tickFormat(d=>d+'d'))
   .selectAll('text').attr('fill','var(--text3)').attr('font-size',8);

  // 当前点
  g.append('circle').attr('cx',0).attr('cy',yScale(s0)).attr('r',3).attr('fill','var(--cyan)');
  g.append('text').attr('x',3).attr('y',yScale(s0)-4).attr('fill','var(--cyan)').attr('font-size',8).text('NOW');

  document.getElementById(legendId).innerHTML = `
    <span style="color:var(--green)">─── 牛市路径 +${stock.probs[0]}%概率</span>
    <span style="color:var(--red)">─── 熊市路径</span>
    <span style="color:var(--blue)">░ 90%置信区间</span>
    <span style="color:var(--gold)">--- 期权目标价 ${stock.targets.m1}</span>`;
}

// ═══════════════════════════════════════════════════════════════
// 切换板块
// ═══════════════════════════════════════════════════════════════
function setSector(id) {
  activeSector = SECTORS.find(s=>s.id===id);
  renderSidebar();
  renderRotation();
  renderSectorContent(activeSector);
}

function setPredStock(btn, ticker, sectorId) {
  document.querySelectorAll('.pred-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const s  = SECTORS.find(x=>x.id===sectorId);
  const st = s.stocks.find(x=>x.t===ticker);
  renderPredChart(s, st, `pred-svg-${sectorId}`, `pred-legend-${sectorId}`);
}

function showDetail(ticker, sectorId) {
  // 点击查看详情 — 简单toast提示
  const el = document.createElement('div');
  el.style.cssText = 'position:fixed;bottom:20px;right:20px;background:#0a1929;border:1px solid #1e2d3d;border-radius:8px;padding:12px 18px;font-size:12px;color:#c9d8e8;z-index:999;animation:fadeIn .3s';
  el.innerHTML = `📊 <b style="color:#00d084">${ticker}</b> — 已添加到自选监控`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), 2500);
}

// ═══════════════════════════════════════════════════════════════
// 实时时钟 + 市场数据跳动
// ═══════════════════════════════════════════════════════════════
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US',{hour12:false}) + ' EST';
}

let spy=476.82, qqq=408.14, vix=16.8;
function tickMarket() {
  spy = +(spy + (Math.random()-.49)*.15).toFixed(2);
  qqq = +(qqq + (Math.random()-.49)*.18).toFixed(2);
  vix = Math.max(12, Math.min(35, +(vix + (Math.random()-.5)*.1).toFixed(1)));
  document.getElementById('spy-val').textContent = spy.toFixed(2);
  document.getElementById('qqq-val').textContent = qqq.toFixed(2);
  document.getElementById('vix-val').textContent = vix;
  document.getElementById('vix-val').style.color = vix<15?'var(--green)':vix<20?'var(--yellow)':'var(--red)';
}

function randomTime() {
  const h=15, m=Math.floor(Math.random()*59), s=Math.floor(Math.random()*59);
  return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

renderRotation();
renderSectorContent(activeSector);
updateClock();
setInterval(updateClock, 1000);
setInterval(tickMarket, 2000);
</script>
